async function openPersonDetail(cluster) {
    _currentPersonCluster = cluster;
    exitPersonSelectMode();
    const content = document.getElementById('people-content');
    document.getElementById('people-title').textContent = cluster.name || 'Unknown';
    document.getElementById('people-subtitle').textContent = cluster.photo_count + ' photos';
    const _rb = document.getElementById('header-review-btn'); if (_rb) _rb.remove();
    content.innerHTML = '<div class="text-term-gray text-[12px] py-10 text-center">Loading…</div>';
    try {
        const resp = await fetch('/api/photos/face/' + cluster.id);
        if (!resp.ok) throw new Error();
        const photos = await resp.json();
        _currentPersonPhotos = photos;
        content.innerHTML = '';

        // Toolbar — only person-level actions
        const toolbar = document.createElement('div');
        toolbar.style.cssText = 'padding:8px 12px;display:flex;justify-content:flex-end;gap:8px;';
        const nameBtn = document.createElement('button');
        nameBtn.className = 'ps-btn ps-btn-move';
        nameBtn.textContent = cluster.name ? 'Rename' : 'Name';
        nameBtn.addEventListener('click', () => {
            const name = prompt('Name this person:', cluster.name || '');
            if (name === null || !name.trim()) return;
            fetch('/api/photos/face/' + cluster.id + '/name', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: name.trim() })
            }).then(r => { if (r.ok) { cluster.name = name.trim(); document.getElementById('people-title').textContent = name.trim(); } });
        });
        toolbar.appendChild(nameBtn);
        content.appendChild(toolbar);

        // Separate review photos from regular ones
        const reviewPhotos = photos.filter(p => p.is_new);
        const regularPhotos = photos.filter(p => !p.is_new);

        // Group photos by month (present → past)
        const MONTH_NAMES = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
        const monthGroups = new Map();
        // Add review photos as special group first
        if (reviewPhotos.length) {
            monthGroups.set('_REVIEW', reviewPhotos.map(item => ({ item })));
        }
        for (let i = 0; i < regularPhotos.length; i++) {
            const item = regularPhotos[i];
            const d = item.date ? new Date(item.date * 1000) : null;
            const key = d ? (d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0')) : '0000-00';
            if (!monthGroups.has(key)) monthGroups.set(key, []);
            monthGroups.get(key).push({ item });
        }
        // Sort month keys: _REVIEW first, then newest first
        const sortedKeys = [...monthGroups.keys()].sort((a, b) => {
            if (a === '_REVIEW') return -1;
            if (b === '_REVIEW') return 1;
            return b.localeCompare(a);
        });
        // Sort within each month by date descending and rebuild photos array in display order
        const reordered = [];
        for (const key of sortedKeys) {
            const entries = monthGroups.get(key);
            entries.sort((a, b) => (b.item.date || 0) - (a.item.date || 0));
            for (const entry of entries) { entry.globalIdx = reordered.length; reordered.push(entry.item); }
        }
        _currentPersonPhotos = reordered;

        for (const key of sortedKeys) {
            const entries = monthGroups.get(key);
            // Month header
            const header = document.createElement('div');
            header.className = 'month-header visible';
            header.style.cssText = 'padding:14px 4px 8px;display:flex;align-items:baseline;gap:8px;';
            const parts = key.split('-');
            const isReview = key === '_REVIEW';
            const label = isReview ? 'New — Review' : (key === '0000-00' ? 'Unknown Date' : MONTH_NAMES[parseInt(parts[1])] + ' ' + parts[0]);
            const labelColor = isReview ? 'color:#ff4a6e' : '';
            header.innerHTML = '<span class="text-[22px] font-bold tracking-[0.12em]" style="font-family:\'Rajdhani\',sans-serif;font-weight:700;text-transform:uppercase;' + (isReview ? 'color:#ff4a6e' : 'color:var(--accent-bright)') + '">' + label.toUpperCase() + '</span>'
                + '<span class="text-term-dark text-[14px]">' + entries.length + '</span>';
            content.appendChild(header);

            const grid = document.createElement('div');
            grid.className = 'grid zoom-5 gap-[2px]';
            for (const { item, globalIdx } of entries) {
                const h = _hashFromThumb(item);
                const container = document.createElement('div');
                container.className = 'thumb-container skeleton';
                container.dataset.phash = h;
                if (item.is_new) {
                    container.style.outline = '3px solid #ff4a6e';
                    container.style.outlineOffset = '-3px';
                    container.style.zIndex = '1';
                }
                if (item.type === 'video') {
                    const badge = document.createElement('div');
                    badge.className = 'video-badge';
                    container.appendChild(badge);
                }
                const img = new Image(); img.src = item.thumb || ''; img.alt = '';
                img.onload = () => { container.classList.remove('skeleton'); img.classList.add('thumb-loaded'); };
                img.onerror = () => container.classList.remove('skeleton');
                container.appendChild(img);
                const _photoIdx = globalIdx;
                container.addEventListener('click', (e) => {
                    if (_personSelectMode) {
                        e.stopPropagation(); e.preventDefault();
                        if (_personSelectedHashes.has(h)) {
                            _personSelectedHashes.delete(h); container.classList.remove('selected');
                        } else {
                            _personSelectedHashes.add(h); container.classList.add('selected');
                        }
                        updatePersonSelCount();
                    } else {
                        openLightbox(_photoIdx, _currentPersonPhotos);
                    }
                });
                container.addEventListener('contextmenu', (e) => {
                    if (_personSelectMode) return;
                    e.stopPropagation(); e.preventDefault();
                    _showPhotoMenu(e, h, _photoIdx, container);
                });
                grid.appendChild(container);
            }
            content.appendChild(grid);
        }
    } catch(e) {
        content.innerHTML = '<div class="text-term-gray text-[12px] py-10 text-center">Failed to load.</div>';
    }
}

// ─── Download helpers ───
function _isVideo(path) {
    return /\.(mov|mp4|m4v|avi|mkv)$/i.test(path);
}

// Build the fetch URL for sharing: images always requested as JPEG so Web Share API accepts them
function _shareUrl(path) {
    if (_isVideo(path)) return '/api/photos/download?p=' + encodeURIComponent(path);
    return '/api/photos/download?p=' + encodeURIComponent(path) + '&fmt=jpeg';
}

function _shareFilename(path) {
    const base = path.split('/').pop();
    if (_isVideo(path)) return base;
    return base.replace(/\.[^.]+$/, '.jpg');
}

async function downloadSinglePhoto(path) {
    const isMobile = navigator.maxTouchPoints > 0;
    if (isMobile && navigator.share) {
        try {
            const r = await fetch(_shareUrl(path));
            if (!r.ok) throw new Error(`${r.status}`);
            const b = await r.blob();
            const mime = _isVideo(path) ? (b.type || 'video/mp4') : 'image/jpeg';
            const file = new File([b], _shareFilename(path), { type: mime });
            await navigator.share({ files: [file] });
            return;
        } catch (e) { if (e.name === 'AbortError') return; }
    }
    window.location.href = '/api/photos/download?p=' + encodeURIComponent(path);
}

(function() {
    const modal = document.getElementById('upload-modal');

        modal.classList.add('modal-visible');
    });

    document.getElementById('upload-close').addEventListener('click', closeUploadModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeUploadModal(); });

    function closeUploadModal() {
        if (uploading) {
            if (!confirm('Upload in progress. Close anyway?')) return;
        }
        modal.classList.remove('modal-visible');
        const onEnd = () => {
            modal.removeEventListener('transitionend', onEnd);
            if (!modal.classList.contains('modal-visible')) modal.classList.remove('active');
        };
        modal.addEventListener('transitionend', onEnd);
        setTimeout(onEnd, 200);
        if (anySuccess) {
            window.location.reload();
        }
        // Reset state
        files = [];
        fileList.innerHTML = '';
        summary.style.display = 'none';
        anySuccess = false;
    }

    // Drag & drop
    drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
    drop.addEventListener('drop', (e) => {
        e.preventDefault();
        drop.classList.remove('dragover');
        addFiles(e.dataTransfer.files);
    });

    // Click to browse
    drop.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) addFiles(fileInput.files);
        fileInput.value = '';
    });

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
        return (bytes/(1024*1024)).toFixed(1) + ' MB';
    }

    function addFiles(newFiles) {
        for (const f of newFiles) {
            const row = document.createElement('div');
            row.className = 'upload-file';
            row.innerHTML = `
                <div style="flex:1;min-width:0">
                    <div class="upload-file-name">${f.name}</div>
                    <div class="upload-file-bar"><div class="upload-file-bar-fill"></div></div>
                </div>
                <div class="upload-file-size">${formatSize(f.size)}</div>
                <div class="upload-file-status waiting">waiting</div>
            `;
            fileList.appendChild(row);
            files.push({
                file: f,
                status: 'waiting',
                el: row,
                barFill: row.querySelector('.upload-file-bar-fill'),
                statusEl: row.querySelector('.upload-file-status')
            });
        }
        updateSummary();
        summary.style.display = 'flex';
    }

    function updateSummary() {
        let done = 0, dup = 0, err = 0, remaining = 0;
        for (const f of files) {
            if (f.status === 'done') done++;
            else if (f.status === 'duplicate') dup++;
            else if (f.status === 'error') err++;
            else remaining++;
        }
        let parts = [];
        if (done) parts.push(`<span class="stat-ok">${done} uploaded</span>`);
        if (dup) parts.push(`<span class="stat-dup">${dup} duplicate${dup>1?'s':''}</span>`);
        if (err) parts.push(`<span class="stat-err">${err} error${err>1?'s':''}</span>`);
        if (remaining) parts.push(`<span>${remaining} remaining</span>`);
        statsEl.innerHTML = parts.join('');
        goBtn.disabled = remaining === 0 || uploading;
    }

    goBtn.addEventListener('click', startUpload);

    async function startUpload() {
        if (uploading) return;
        uploading = true;
        goBtn.disabled = true;
        goBtn.textContent = 'Uploading…';

        for (const item of files) {
            if (item.status !== 'waiting') continue;
            item.status = 'uploading';
            item.statusEl.className = 'upload-file-status uploading';
            item.statusEl.textContent = '0%';

            try {
                const result = await uploadOne(item);
                if (result.status === 'ok') {
                    item.status = 'done';
                    item.statusEl.className = 'upload-file-status done';
                    item.statusEl.textContent = 'done';
                    item.barFill.style.width = '100%';
                    item.barFill.style.background = '#34d399';
                    anySuccess = true;
                } else if (result.status === 'skipped') {
                    item.status = 'duplicate';
                    item.statusEl.className = 'upload-file-status duplicate';
                    item.statusEl.textContent = 'duplicate';
                    item.barFill.style.width = '100%';
                    item.barFill.style.background = '#fbbf24';
                } else {
                    throw new Error(result.error || 'Unknown error');
                }
            } catch (e) {
                item.status = 'error';
                item.statusEl.className = 'upload-file-status error';
                item.statusEl.textContent = 'error';
                item.barFill.style.background = '#f87171';
            }
            updateSummary();
        }

        uploading = false;
        goBtn.textContent = 'Upload';
        updateSummary();
    }

    function uploadOne(item) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            const fd = new FormData();
            fd.append('file', item.file);

            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    item.barFill.style.width = pct + '%';
                    item.statusEl.textContent = pct + '%';
                }
            });

            xhr.addEventListener('load', () => {
                try {
                    const data = JSON.parse(xhr.responseText);
                    if (xhr.status >= 200 && xhr.status < 300) {
                        resolve(data);
                    } else if (xhr.status === 200) {
                        resolve(data);
                    } else {
                        reject(new Error(data.error || `HTTP ${xhr.status}`));
                    }
                } catch (e) {
                    reject(new Error(`HTTP ${xhr.status}`));
                }
            });

            xhr.addEventListener('error', () => reject(new Error('Network error')));
            xhr.addEventListener('timeout', () => reject(new Error('Timeout')));
            xhr.timeout = 300000; // 5 min per file

            xhr.open('POST', '/api/upload');
            xhr.send(fd);
        });
    }
})();

// ─── Init ───
buildGallery();
document.getElementById('btn-grid').classList.add('active');

// ─── Service Worker — register and trigger full thumbnail precache ───
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
        function triggerPrecache(sw) {
            sw.postMessage({ type: 'PRECACHE_BUNDLE', expectedCount: photoData.total || 0 });
        }
        const sw = reg.active || reg.waiting || reg.installing;
        if (reg.active) {
            triggerPrecache(reg.active);
        } else if (sw) {
            sw.addEventListener('statechange', () => {
                if (sw.state === 'activated') triggerPrecache(sw);
            });
        }
    }).catch(() => {});
}
</script>

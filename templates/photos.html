<!DOCTYPE html>
<html lang="en" style="background:#04070d">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROMETHEON PHOTOS</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="apple-touch-icon" href="/static/favicon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#04070d">
    {% for thumb in first_thumbs %}<link rel="preload" href="{{ thumb }}" as="image" fetchpriority="high">
    {% endfor %}<script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    bg:     { DEFAULT: '#04070d', panel: '#070c16', tertiary: '#0a1220' },
                    accent: { DEFAULT: '#6495ed', bright: '#9ab5f5', dim: '#111d40' },
                    term:   { white: '#b0cfe0', bright: '#ddf0ff', gray: '#2d4a60', dark: '#152030' },
                    border: '#0c1e30',
                },
                fontFamily: {
                    mono:     ['JetBrains Mono', 'monospace'],
                    ui:       ['Rajdhani', 'sans-serif'],
                },
            }
        }
    }
    </script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #pg-overlay {
            position: fixed; inset: 0; background: #04070d;
            z-index: 9999; pointer-events: none;
            transition: opacity 0.15s ease;
        }

        body {
            background: #04070d;
            -webkit-text-size-adjust: 100%;
        }
        ::-webkit-scrollbar { width: 14px; }
        ::-webkit-scrollbar-track { background: #060e18; }
        ::-webkit-scrollbar-thumb { background: #1a3050; border-radius: 7px; min-height: 60px; border: 3px solid #060e18; }
        ::-webkit-scrollbar-thumb:hover { background: #2d4a60; }
        ::-webkit-scrollbar-thumb:active { background: #6495ed; }

        .thumb-container {
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
            background: #070c16;
            border-radius: 3px;
        }
        .thumb-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @media (hover: hover) {
            .thumb-container img {
                transition: transform 0.25s ease, filter 0.25s ease;
            }
            .thumb-container:hover img {
                transform: scale(1.05);
                filter: brightness(1.1);
            }
            .thumb-container:active { opacity: 0.8; }
        }
        @media (hover: none) {
            .thumb-container:active { transform: scale(0.96); }
        }
        .video-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.55);
            border: 2px solid rgba(255,255,255,0.85);
            border-radius: 50%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .video-badge::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 6px 0 6px 11px;
            border-color: transparent transparent transparent rgba(255,255,255,0.9);
            margin-left: 2px;
        }
        body.select-mode .dl-btn { display: none; }

        /* Grid columns */
        .zoom-5 { grid-template-columns: repeat(5, 1fr); }
        .zoom-month { grid-template-columns: repeat(3, 1fr); }
        .zoom-year { grid-template-columns: repeat(2, 1fr); }

        @media (max-width: 768px) {
            .zoom-5 { grid-template-columns: repeat(3, 1fr); }
            .zoom-month { grid-template-columns: repeat(2, 1fr); }
            .zoom-year { grid-template-columns: 1fr; }
        }
        @media (min-width: 1400px) {
            .zoom-5 { grid-template-columns: repeat(7, 1fr); }
            .zoom-month { grid-template-columns: repeat(4, 1fr); }
            .zoom-year { grid-template-columns: repeat(3, 1fr); }
        }

        /* Lightbox — immersive photo viewer */
        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #000;
            cursor: none;
            display: none;
            touch-action: none;
            opacity: 0;
            transition: opacity 150ms ease-out;
        }
        #lightbox.active { display: block; }
        #lightbox.lb-visible { opacity: 1; }
        #lightbox.lb-ui-visible { cursor: default; }

        /* Image slide transitions */
        .lb-slide-left  { transform: translateX(-100%); opacity: 0; transition: transform 200ms ease-out, opacity 200ms ease-out; }
        .lb-slide-right { transform: translateX(100%);  opacity: 0; transition: transform 200ms ease-out, opacity 200ms ease-out; }

        /* Modal animations */
        .modal-animate { opacity: 0; transition: opacity 150ms ease-out; }
        .modal-animate.modal-visible { opacity: 1; }
        .modal-animate .modal-card { transform: scale(0.95); opacity: 0; transition: transform 150ms ease-out, opacity 150ms ease-out; }
        .modal-animate.modal-visible .modal-card { transform: scale(1); opacity: 1; }

        /* Overlay UI — fades in/out */
        .lb-overlay {
            position: absolute;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        #lightbox.lb-ui-visible .lb-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        /* Top bar — gradient fade from black */
        .lb-top {
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: calc(20px + env(safe-area-inset-top, 0px)) 24px 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
        }
        .lb-top-left, .lb-top-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .lb-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            color: rgba(255,255,255,0.75);
            border-radius: 50%;
        }
        .lb-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .lb-btn.delete-btn:hover { color: #ff4a6e; background: rgba(255,74,110,0.12); }
        .lb-btn svg { width: 20px; height: 20px; }

        /* Bottom bar — gradient fade from black, date + people */
        .lb-bottom {
            bottom: 0; left: 0; right: 0;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 40px 24px 24px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
        }
        .lb-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .lb-date {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .lb-counter {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }
        .lb-filename { display: none; }

        /* People chips in bottom bar */
        #lb-people {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        #lb-people:empty { display: none; }
        .lb-person {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 5px 12px 5px 5px;
            border-radius: 100px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .lb-person:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.2);
        }
        .lb-person-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255,255,255,0.05);
        }
        .lb-person-name {
            font-size: 13px;
            color: #fff;
            font-weight: 500;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Nav arrows */
        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
            z-index: 10;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
        }
        #lightbox.lb-ui-visible .lb-nav {
            opacity: 1;
            pointer-events: auto;
        }
        .lb-nav svg { width: 28px; height: 28px; }
        .lb-nav:hover { background: rgba(255,255,255,0.08); color: #fff; }

        /* Media area */
        #lb-media-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #lb-media-wrap img,
        #lb-media-wrap video {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
        #lb-media-wrap img.lb-zoomed {
            max-width: none;
            max-height: none;
            cursor: zoom-out;
        }
        #lb-media-wrap img:not(.lb-zoomed) {
            cursor: default;
        }
        .lb-thumb-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        .lb-thumb-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(40px) brightness(0.15) saturate(0.5);
            transform: scale(1.3);
        }
        .lb-loading {
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            animation: lb-pulse 2s ease-in-out infinite;
            position: absolute;
            z-index: 1;
            font-weight: 500;
        }
        @keyframes lb-pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.7; }
        }

        /* Scroll month indicator */
        #scroll-indicator {
            position: fixed;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(7,12,22,0.95);
            border: 1px solid rgba(100,149,237,0.25);
            color: #6495ed;
            font-family: 'Rajdhani', sans-serif;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 14px 24px;
            border-radius: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 200;
            white-space: nowrap;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(100,149,237,0.12);
        }
        #scroll-indicator.visible { opacity: 1; }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #070c16 25%, #0d1828 50%, #070c16 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes thumbFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .thumb-loaded {
            animation: thumbFadeIn 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.05) forwards;
        }

        @keyframes viewFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .view-enter {
            animation: viewFadeIn 0.25s ease-out forwards;
        }

        /* Month section header in grid */
        .month-header {
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .month-header.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Year header in grid view (month-within-year label above photo strip) */
        .year-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 40px 4px 14px;
        }
        .year-header:first-child { padding-top: 24px; }
        .year-header-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #6495ed;
            letter-spacing: 0.2em;
            white-space: nowrap;
            text-transform: uppercase;
        }
        .year-header-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, #0c1e30, transparent);
        }

        /* ── Year cards (photo background) ── */
        .year-card-new {
            position: relative;
            overflow: hidden;
            background: #070c16;
            border: 1px solid #0c1e30;
            cursor: pointer;
            aspect-ratio: 3/2;
            display: block;
            transition: box-shadow 0.3s, border-color 0.3s;
        }
        .year-card-new:hover {
            border-color: rgba(100,149,237,0.4);
            box-shadow: 0 0 40px rgba(100,149,237,0.12);
        }
        .year-card-new:active { opacity: 0.85; }

        .year-card-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s ease, filter 0.3s ease;
            filter: brightness(0.38) saturate(0.75);
        }
        .year-card-new:hover .year-card-bg {
            transform: scale(1.04);
            filter: brightness(0.5) saturate(0.9);
        }

        /* no-photo fallback */
        .year-card-bg.no-photo {
            background: #070c16;
            filter: none;
        }

        .year-card-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(4,7,13,0.92) 0%, rgba(4,7,13,0.3) 50%, transparent 100%);
        }

        .year-card-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 18px 20px;
        }
        .year-card-year {
            font-family: 'Rajdhani', sans-serif;
            font-size: 42px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.06em;
            line-height: 1;
            text-shadow: 0 2px 20px rgba(0,0,0,0.6);
        }
        .year-card-bottom {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }
        .year-card-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 400;
            color: rgba(255,255,255,0.5);
        }
        .year-card-unit {
            font-family: 'Rajdhani', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }

        /* no-photo fallback watermark */
        .year-card-watermark {
            position: absolute;
            right: -8px;
            bottom: -16px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 110px;
            font-weight: 700;
            color: rgba(100,149,237,0.055);
            line-height: 1;
            pointer-events: none;
            user-select: none;
            letter-spacing: -0.02em;
            z-index: 1;
        }
        .year-card-new.has-photo .year-card-watermark { display: none; }
        .year-card-new.has-photo .year-card-year { color: #fff; }

        /* ── Month cards (photo grid, same vibe as year) ── */
        .month-year-group { margin-bottom: 48px; }

        .month-year-sep {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }
        .month-year-sep-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #2d4a60;
            white-space: nowrap;
        }
        .month-year-sep-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, #0c1e30, transparent);
        }
        .month-year-sep-total {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #152030;
            white-space: nowrap;
        }

        .month-card-new {
            position: relative;
            overflow: hidden;
            background: #070c16;
            border: 1px solid #0c1e30;
            cursor: pointer;
            aspect-ratio: 4/3;
            transition: box-shadow 0.3s, border-color 0.3s;
        }
        .month-card-new:hover {
            border-color: rgba(100,149,237,0.35);
            box-shadow: 0 0 30px rgba(100,149,237,0.1);
        }
        .month-card-new:active { opacity: 0.85; }

        .month-card-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s ease, filter 0.3s ease;
            filter: brightness(0.38) saturate(0.75);
        }
        .month-card-new:hover .month-card-bg {
            transform: scale(1.05);
            filter: brightness(0.5) saturate(0.9);
        }
        .month-card-bg.no-photo {
            background: #070c16;
            filter: none;
        }
        .month-card-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(4,7,13,0.95) 0%, rgba(4,7,13,0.2) 55%, transparent 100%);
        }
        .month-card-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 14px 16px;
        }
        .month-card-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1;
            text-shadow: 0 1px 12px rgba(0,0,0,0.5);
        }
        .month-card-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 3px;
        }
        /* no-photo fallback */
        .month-card-new.no-photo .month-card-name { color: #6495ed; }
        .month-card-new.no-photo .month-card-count { color: #2d4a60; }

        /* View tabs */
        .view-tab {
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: transparent;
            color: #2d4a60;
            cursor: pointer;
            transition: all 0.15s;
        }
        .view-tab:hover { color: #b0cfe0; background: rgba(255,255,255,0.03); }
        .view-tab.active { background: #111d40; color: #6495ed; }

        /* Trash panel */
        #trash-panel {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 900;
            background: #04070d;
            transform: translateX(100%);
            transition: transform 200ms ease-out;
        }
        #trash-panel.active { display: flex; flex-direction: column; }
        #trash-panel.panel-visible { transform: translateX(0); }

        .trash-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            border-bottom: 1px solid #0c1e30;
            transition: background 0.15s;
        }
        .trash-item:hover { background: #070c16; }
        .trash-thumb {
            width: 52px;
            height: 52px;
            border-radius: 0;
            object-fit: cover;
            background: #070c16;
            flex-shrink: 0;
        }
        .trash-info { flex: 1; min-width: 0; }
        .restore-btn {
            padding: 5px 14px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: 1px solid #0c1e30;
            color: #6495ed;
            cursor: pointer;
            transition: all 0.15s;
        }
        .restore-btn:hover { background: #111d40; border-color: #6495ed; }


        /* ─── People panel ─── */
        #people-panel {
            display: none; position: fixed; inset: 0;
            z-index: 900; background: #04070d; flex-direction: column;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 200ms ease-out;
        }
        #people-panel.active { display: flex; }
        #people-panel.panel-visible { transform: translateX(0); }

        .person-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 20px; padding: 20px 16px;
        }
        @media (min-width: 640px) {
            .person-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 24px; padding: 24px; }
        }
        .person-card {
            display: flex; flex-direction: column; align-items: center;
            gap: 8px; cursor: pointer; transition: transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .person-card:hover { transform: translateY(-3px); }
        .person-card:active { transform: scale(0.97); }
        .person-avatar {
            width: 100%; aspect-ratio: 1; border-radius: 50%;
            object-fit: cover; border: 2px solid #0c1e30;
            background: #070c16; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .person-card:hover .person-avatar { border-color: #6495ed; box-shadow: 0 4px 20px rgba(100,149,237,0.12); }
        .person-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #b0cfe0;
            text-align: center; overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; width: 100%;
        }
        .person-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; color: #2d4a60; margin-top: -4px;
        }

        /* ─── Select mode ─── */
        #select-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 800;
            background: #070c16; border-top: 1px solid #0c1e30;
            padding: 12px 16px; display: none;
            align-items: center; justify-content: space-between; gap: 10px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
            transform: translateY(100%);
            transition: transform 150ms ease-out;
        }
        #select-bar.active { display: flex; }

        .review-btn {
            flex: 1; padding: 12px; border: 1px solid;
            font-family: 'Rajdhani', sans-serif; font-size: 14px;

        body.select-mode .thumb-container { cursor: pointer !important; }

        }

            content: '✓'; position: absolute; top: 4px; right: 6px;

        /* ── Rajdhani for all UI labels ── */
        a, button,

        .year-header-text,

        .person-name,

        .video-badge {

        }

        .person-count, #photo-count {
            font-family: 'JetBrains Mono', monospace;
        }

        /* ─── Mobile toolbar ─── */
        @supports (padding: env(safe-area-inset-top)) {
            .lb-footer { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        }

        /* GPU-friendly sections for mobile scroll */
        @media (hover: none) {
            section[data-month-key] { content-visibility: auto; contain-intrinsic-size: auto 500px; }
            .lb-nav { display: none !important; }

        }
        body.lb-open { overflow: hidden !important; overscroll-behavior: none; }

        @media (max-width: 640px) {
            .lb-top, .lb-bottom { padding-left: 16px; padding-right: 16px; }

            .delete-modal-inner { margin: 0 16px; }

            .trash-item { padding: 10px 12px; }
        }

        @media (max-width: 390px) {
            .view-tab { padding: 6px 8px !important; font-size: 10px !important; }
        }

        /* ─── Search suggestions dropdown ─── */
        #search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: var(--bg-tertiary, #1a1a2e);

            border-radius: 8px;

            z-index: 200;

        #search-suggestions.hidden { display: none; }
        .suggestion-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;

            transition: background 0.15s;

        }
        .suggestion-row:hover, .suggestion-row.active {
            background: rgba(255,255,255,0.08);

        .suggestion-avatar {
            width: 28px;
            height: 28px;

            flex: 1;
        }
        .suggestion-count {
            font-size: 10px;
            color: var(--term-gray, #888);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ─── People chips in search results ─── */
        .people-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 2px 4px;
        }
        .person-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px 4px 4px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Rajdhani', sans-serif;
        }
        .person-chip:hover {
            border-color: var(--accent-dim, #5a5aff);
            background: rgba(90,90,255,0.1);
        }
        .chip-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255,255,255,0.05);
        }
        .chip-name {
            font-size: 11px;
            color: var(--term-white, #e0e0e0);
            font-weight: 600;

            color: var(--term-gray, #888);

        }

        /* ─── Upload modal ─── */
        #upload-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1050;
            background: rgba(0,0,0,0.85);

            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 150ms ease-out;
        }
        #upload-modal.active { display: flex; }
        #upload-modal.modal-visible { opacity: 1; }
        #upload-modal .upload-panel { transform: scale(0.95); opacity: 0; transition: transform 150ms ease-out, opacity 150ms ease-out; }
        #upload-modal.modal-visible .upload-panel { transform: scale(1); opacity: 1; }
        .upload-panel {
            background: var(--bg-panel, #0a0f1a);
            border: 1px solid var(--border, #1a2a3a);
            border-radius: 16px;
            width: 90%;
            max-width: 560px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
        }
        .upload-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border, #1a2a3a);
        }
        .upload-header h2 {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-bright, #5eead4);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin: 0;
        }
        .upload-close {
            background: none;
            border: none;
            color: var(--term-gray, #888);
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }
        .upload-close:hover { color: var(--term-white, #e0e0e0); }
        .upload-drop {
            margin: 16px 20px;
            padding: 32px 20px;
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .upload-drop:hover, .upload-drop.dragover {
            border-color: var(--accent-dim, #2dd4bf55);
            background: rgba(45,212,191,0.05);
        }
        .upload-drop svg { margin: 0 auto 8px; opacity: 0.5; }
        .upload-drop p { color: var(--term-gray, #888); font-size: 12px; margin: 0; }
        .upload-drop .browse-link { color: var(--accent, #2dd4bf); cursor: pointer; }
        .upload-filelist {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px;
            max-height: 35vh;
        }
        .upload-file {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 11px;
        }
        .upload-file-name {
            flex: 1;
            color: var(--term-white, #e0e0e0);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .upload-file-size {
            color: var(--term-gray, #888);
            white-space: nowrap;
            font-size: 10px;
        }
        .upload-file-status {
            width: 70px;
            text-align: right;
            white-space: nowrap;
            font-size: 10px;
            font-weight: 600;
        }
        .upload-file-status.waiting { color: var(--term-gray, #888); }
        .upload-file-status.uploading { color: var(--accent, #2dd4bf); }
        .upload-file-status.done { color: #34d399; }
        .upload-file-status.duplicate { color: #fbbf24; }
        .upload-file-status.error { color: #f87171; }
        .upload-file-bar {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .upload-file-bar-fill {
            height: 100%;
            background: var(--accent, #2dd4bf);
            width: 0%;
            transition: width 0.15s;
            border-radius: 2px;
        }
        .upload-summary {
            padding: 12px 20px;
            border-top: 1px solid var(--border, #1a2a3a);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: var(--term-gray, #888);
        }
        .upload-summary-stats span { margin-right: 12px; }
        .upload-summary-stats .stat-ok { color: #34d399; }
        .upload-summary-stats .stat-dup { color: #fbbf24; }
        .upload-summary-stats .stat-err { color: #f87171; }
        .upload-go {
            background: var(--accent-dim, #2dd4bf55);
            color: var(--accent-bright, #5eead4);
            border: none;
            padding: 6px 18px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .upload-go:disabled { opacity: 0.4; cursor: default; }
    </style>
</head>

<script>
// ─── Page transitions ───
(function() {
    const ov = document.getElementById('pg-overlay');
    requestAnimationFrame(() => { ov.style.opacity = '0'; });
    document.addEventListener('click', function(e) {
        const a = e.target.closest('a[href]');
        if (!a || !a.href) return;
        let url; try { url = new URL(a.href); } catch { return; }
        if (url.origin !== location.origin) return;
        if (a.target || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
        e.preventDefault();
        const dest = a.href;
        ov.style.opacity = '1';
        setTimeout(() => { location.href = dest; }, 160);
    });
    window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
            ov.style.transition = 'none';
            ov.style.opacity = '1';
            requestAnimationFrame(() => {
                ov.style.transition = 'opacity 0.15s ease';
                ov.style.opacity = '0';
            });
        }
    });
})();

const gallery = document.getElementById('gallery');
const overview = document.getElementById('overview');
const sentinel = document.getElementById('sentinel');
const lightbox = document.getElementById('lightbox');
const lbContent = document.getElementById('lb-content');
const lbMediaWrap = document.getElementById('lb-media-wrap');
const lbDate = document.getElementById('lb-date');
const lbCounter = document.getElementById('lb-counter');
const lbFilename = document.getElementById('lb-filename');

let allItems = [];
let lbIndex = -1;
let lbZoomed = false;

function getHeaderH() { return document.getElementById('main-header').offsetHeight; }
const HEADER_H = getHeaderH();

function getGridMetrics() {
    const cols = window.innerWidth >= 1400 ? 7 : window.innerWidth >= 768 ? 5 : 3;
    const gap = 2;
    const cs = getComputedStyle(gallery);
    let contentWidth = gallery.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
    if (contentWidth <= 0) contentWidth = window.innerWidth - 14 - (window.innerWidth >= 768 ? 24 : 16);
    const cellSize = (contentWidth - (cols - 1) * gap) / cols;
    return { cols, gap, cellSize };
}

function calcPlaceholderHeight(count) {
    const { cols, gap, cellSize } = getGridMetrics();
    const rows = Math.ceil(count / cols);
    return rows * cellSize + Math.max(0, rows - 1) * gap;
}

// ─── View state ───
let currentView = 'grid';
let pendingScrollTo = null;

function setView(view) {
    if (isSearchMode) { searchInput.value = ''; exitSearch(); }
    currentView = view;
    ['year', 'month', 'grid'].forEach(v => {
        document.getElementById('btn-' + v).classList.toggle('active', v === view);
    });

    if (view === 'year' || view === 'month') {
        gallery.classList.add('hidden');
        overview.classList.remove('hidden');
        overview.classList.remove('view-enter');
        void overview.offsetWidth;
        overview.classList.add('view-enter');
        renderOverview(view);
    } else {
        gallery.classList.remove('hidden');
        overview.classList.add('hidden');
        gallery.classList.remove('view-enter');
        void gallery.offsetWidth;
        gallery.classList.add('view-enter');
    }
}

// Pinch to zoom (gallery view switching — guarded so lightbox pinch takes priority)
let lastPinchDist = 0;
document.addEventListener('touchstart', (e) => {
    if (lightbox.classList.contains('active')) return; // lightbox handles its own pinch
    if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastPinchDist = Math.sqrt(dx*dx + dy*dy);
    }
});
document.addEventListener('touchend', () => { lastPinchDist = 0; });
const VIEW_ORDER = ['year', 'month', 'grid'];
document.addEventListener('touchmove', (e) => {
    if (lightbox.classList.contains('active')) return; // lightbox handles its own pinch
    if (e.touches.length === 2 && lastPinchDist > 0) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const delta = dist - lastPinchDist;
        if (Math.abs(delta) > 50) {
            const idx = VIEW_ORDER.indexOf(currentView);
            if (delta > 0 && idx < VIEW_ORDER.length - 1) setView(VIEW_ORDER[idx + 1]);
            if (delta < 0 && idx > 0) setView(VIEW_ORDER[idx - 1]);
            lastPinchDist = dist;
        }
    }
});

// ─── Overview mode (year/month) ───
let summaryData = null;

async function loadSummary() {
    if (summaryData) return summaryData;
    const resp = await fetch('/api/photos/summary');
    if (resp.status === 401) { window.location.href = '/login'; return null; }
    summaryData = await resp.json();
    return summaryData;
}

function jumpToMonth(monthKey) {
    currentView = 'grid';
    ['year', 'month', 'grid'].forEach(v => {
        document.getElementById('btn-' + v).classList.toggle('active', v === 'grid');
    });
    gallery.classList.remove('hidden', 'view-enter');
    overview.classList.add('hidden');

    const el = document.getElementById('month-' + monthKey);
    if (!el) return;

    function scrollToTarget() {
        window.scrollTo({ top: Math.max(0, el.offsetTop - HEADER_H), behavior: 'instant' });
    }

    scrollToTarget();
    renderSection(el);

    const allSections = [...gallery.querySelectorAll('section[data-month-key]')];
    const idx = allSections.indexOf(el);
    for (let i = Math.max(0, idx - 2); i <= Math.min(allSections.length - 1, idx + 2); i++) {
        if (allSections[i] !== el) renderSection(allSections[i]);
    }

    // Corrective scroll: when adjacent sections above render, the target's
    // offsetTop shifts. Poll until all nearby sections are loaded, then re-scroll.
    let corrections = 0;
    function correctScroll() {
        if (corrections > 30) return;
        corrections++;
        const nearbyDone = allSections
            .slice(Math.max(0, idx - 2), idx + 3)
            .every(s => s.dataset.loaded === 'done' || s.dataset.loaded === '');
        if (nearbyDone) {
            requestAnimationFrame(scrollToTarget);
            return;
        }
        requestAnimationFrame(correctScroll);
    }
    requestAnimationFrame(correctScroll);
}

function buildYearCard(year, count, covers) {
    const card = document.createElement('div');
    const cover = covers && covers.length ? covers[0] : null;
    card.className = 'year-card-new' + (cover ? ' has-photo' : '');

    const bgStyle = cover ? `background-image:url('${cover}')` : '';
    card.innerHTML =
        '<div class="year-card-bg' + (cover ? '' : ' no-photo') + '" style="' + bgStyle + '"></div>' +
        '<div class="year-card-gradient"></div>' +
        (!cover ? '<div class="year-card-watermark">' + year + '</div>' : '') +
        '<div class="year-card-content">' +
            '<div class="year-card-year">' + year + '</div>' +
            '<div class="year-card-bottom">' +
                '<span class="year-card-count">' + count.toLocaleString() + '</span>' +
                '<span class="year-card-unit">photos</span>' +
            '</div>' +
        '</div>';
    return card;
}

function buildMonthCard(monthName, count, coverUrl) {
    const card = document.createElement('div');
    const hasPhoto = !!coverUrl;
    card.className = 'month-card-new' + (hasPhoto ? '' : ' no-photo');
    const monthOnly = monthName.split(' ')[0].toUpperCase();
    const bgStyle = hasPhoto ? 'background-image:url(\'' + coverUrl + '\')' : '';
    card.innerHTML =
        '<div class="month-card-bg' + (hasPhoto ? '' : ' no-photo') + '" style="' + bgStyle + '"></div>' +
        '<div class="month-card-gradient"></div>' +
        '<div class="month-card-content">' +
            '<div class="month-card-name">' + monthOnly + '</div>' +
            '<div class="month-card-count">' + count.toLocaleString() + '</div>' +
        '</div>';
    return card;
}

// ─── Overview rendering ───
async function renderOverview(view) {
    overview.innerHTML = '';
    const data = await loadSummary();
    if (!data) return;

    if (view === 'year') {
        const container = document.createElement('div');
        container.className = 'zoom-year grid gap-3 md:gap-4 py-6';
        for (const yr of data.years) {
            const card = buildYearCard(yr.year, yr.count, yr.covers || []);
            const firstMonth = data.months.find(m => m.year === yr.year);
            if (firstMonth) card.addEventListener('click', () => jumpToMonth(firstMonth.month_key));
            container.appendChild(card);
        }
        overview.appendChild(container);
    } else {
        // Group months by year
        const byYear = {};
        for (const mo of data.months) {
            if (!byYear[mo.year]) byYear[mo.year] = [];
            byYear[mo.year].push(mo);
        }
        const years = [...new Set(data.months.map(m => m.year))];

        for (const yr of years) {
            const months = byYear[yr];
            const yearTotal = months.reduce((s, m) => s + m.count, 0);

            const group = document.createElement('div');
            group.className = 'month-year-group';

            // Year separator
            const sep = document.createElement('div');
            sep.className = 'month-year-sep';
            sep.innerHTML =
                '<span class="month-year-sep-label">' + yr + '</span>' +
                '<span class="month-year-sep-line"></span>' +
                '<span class="month-year-sep-total">' + yearTotal.toLocaleString() + ' photos</span>';
            group.appendChild(sep);

            // Photo card grid
            const grid = document.createElement('div');
            grid.className = 'zoom-month grid gap-2 md:gap-3';
            for (const mo of months) {
                const cover = mo.covers && mo.covers.length ? mo.covers[0] : null;
                const card = buildMonthCard(mo.month, mo.count, cover);
                const mk = mo.month_key;
                card.addEventListener('click', () => jumpToMonth(mk));
                grid.appendChild(card);
            }
            group.appendChild(grid);
            overview.appendChild(group);
        }
    }
}

// ─── Gallery data ───
const photoData = window.__PHOTO_DATA__ || { groups: [], total: 0, inline: {} };
let sectionItems = {};

function buildGallery() {
    gallery.innerHTML = '';
    allItems = [];
    sectionItems = {};
    const groups = photoData.groups || [];
    const inline = photoData.inline || {};
    const countEl = document.getElementById('photo-count');
    if (countEl) countEl.textContent = (photoData.total || 0).toLocaleString() + ' photos';

    for (const group of groups) {
        const section = document.createElement('section');
        section.id = 'month-' + group.month_key;
        section.dataset.monthKey = group.month_key;
        section.dataset.count = group.count;
        section.dataset.loaded = '';
        section.className = 'mb-2';

        const header = document.createElement('div');
        header.className = 'month-header px-1 md:px-2 pt-6 pb-3 flex items-baseline gap-3';
        header.innerHTML = '<span class="text-[22px] font-bold tracking-[0.12em] text-accent-bright" style="font-family:\'Rajdhani\',sans-serif;font-weight:700;text-transform:uppercase">' +
            group.month.toUpperCase() + '</span>' +
            '<span class="text-term-dark text-[14px]">' + group.count.toLocaleString() + '</span>';
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'grid zoom-5 gap-[2px]';
        section.appendChild(grid);
        gallery.appendChild(section);

        const inlineItems = inline[group.month_key];
        if (inlineItems && inlineItems.length) {
            sectionItems[group.month_key] = inlineItems;
            renderItems(grid, inlineItems);
            section.dataset.loaded = 'done';
            requestAnimationFrame(() => header.classList.add('visible'));
        } else {
            grid.style.minHeight = calcPlaceholderHeight(group.count) + 'px';
            sectionObserver.observe(section);
        }
    }
}

function renderItems(grid, items) {
    grid.style.minHeight = '';
    for (const item of items) {
        const idx = allItems.length;
        allItems.push(item);
        const container = document.createElement('div');
        container.className = 'thumb-container skeleton';
        container.dataset.idx = idx;
        container.dataset.hash = (item.thumb || '').split('/').pop().replace('.jpg', '');
        if (item.type === 'video') {
            const badge = document.createElement('div');
            badge.className = 'video-badge';
            container.appendChild(badge);
        }
        const img = new Image();
        img.alt = '';
        img.decoding = 'async';
        img.loading = 'lazy';
        img.onload = () => { container.classList.remove('skeleton'); img.classList.add('thumb-loaded'); };
        img.onerror = () => container.classList.remove('skeleton');
        container.appendChild(img);
        img.src = item.thumb || '';
        container.addEventListener('click', () => { if (!selectMode) openLightbox(parseInt(container.dataset.idx, 10)); });
        container.addEventListener('contextmenu', (e) => {
            if (selectMode) return;
            e.preventDefault();
            e.stopPropagation();
            _showGridMenu(e, container.dataset.hash, parseInt(container.dataset.idx, 10), container);
        });
        grid.appendChild(container);
    }
}

// ─── Lazy section loader ───
const sectionObserver = new IntersectionObserver((entries) => {
    for (const entry of entries) {
        if (entry.isIntersecting) { loadSection(entry.target); sectionObserver.unobserve(entry.target); }
    }
}, { rootMargin: '300px' });

async function loadSection(section) {
    if (section.dataset.loaded === 'done' || section.dataset.loaded === 'loading') return;
    section.dataset.loaded = 'loading';
    const monthKey = section.dataset.monthKey;
    const header = section.querySelector('.month-header');
    const grid = section.querySelector('.grid');
    try {
        const resp = await fetch('/api/photos/month/' + monthKey);
        if (resp.status === 401) { window.location.href = '/login'; return; }
        const items = await resp.json();
        sectionItems[monthKey] = items;
        renderItems(grid, items);
        section.dataset.loaded = 'done';
        if (header) requestAnimationFrame(() => header.classList.add('visible'));
    } catch (e) {
        section.dataset.loaded = '';
        console.error('Failed to load month', monthKey, e);
    }
}

// ─── Scroll indicator ───
const scrollIndicator = document.getElementById('scroll-indicator');
let _scrollTimer = null;
window.addEventListener('scroll', () => {
    if (gallery.classList.contains('hidden')) return;
    const sections = [...gallery.querySelectorAll('section[data-month-key]')];
    const mid = window.innerHeight / 2;
    for (let i = sections.length - 1; i >= 0; i--) {
        const rect = sections[i].getBoundingClientRect();
        if (rect.top <= mid) {
            const span = sections[i].querySelector('.month-header span');
            if (span) { scrollIndicator.textContent = span.textContent; scrollIndicator.classList.add('visible'); }
            break;
        }
    }
    clearTimeout(_scrollTimer);
    _scrollTimer = setTimeout(() => scrollIndicator.classList.remove('visible'), 1200);
}, { passive: true });

// ─── Lightbox ───
let _lbItems = null; // when set, lightbox uses this instead of allItems
function _getLbItems() { return _lbItems || allItems; }

let _lbUiTimer = null;
function _lbShowUi() {
    lightbox.classList.add('lb-ui-visible');
    clearTimeout(_lbUiTimer);

function showLbItem(idx) {
    const items = _getLbItems();
    if (idx < 0 || idx >= items.length) return;

    const item = items[idx];
    lbCounter.textContent = (idx + 1) + ' of ' + items.length;
    if (item.date) {
        const d = new Date(item.date * 1000);
        lbDate.textContent = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    } else { lbDate.textContent = ''; }

    bgWrap.className = 'lb-thumb-bg';

        video.poster = item.thumb_hq || item.thumb || '';
        video.controls = true;

        video.src = '/media' + encodeURI(item.path || '');
    } else {
        const img = document.createElement('img');
        img.style.cssText = 'position:relative;z-index:1';
        const thumbHash = (item.thumb || '').split('/').pop();
        const previewUrl = thumbHash ? ('/static/thumbs_preview/' + thumbHash) : '';
        const fullUrl = item.path ? ('/media' + encodeURI(item.path)) : '';
        // Stage 1: show HQ thumb immediately
        img.src = item.thumb_hq || item.thumb || '';
        img.onload = function onHqLoad() {
            loading.remove(); bgWrap.style.display = 'none';
            // Stage 2: load 2048px preview, swap when ready
            if (previewUrl) {
                const preview = new Image();
                preview.onload = () => {
                    if (img.parentNode) img.src = previewUrl;
                    // Stage 3: preload full original for zoom
                    if (fullUrl) {
                        const full = new Image();
                        full.onload = () => { img.dataset.fullSrc = fullUrl; };
                        full.src = fullUrl;
                    }
                };
                preview.src = previewUrl;
            } else if (fullUrl) {
                const full = new Image();
                full.onload = () => { if (img.parentNode) img.src = fullUrl; };
                full.src = fullUrl;
            }
            img.onload = null;
        };
        img.onerror = () => { loading.textContent = 'Failed to load'; };
        // Double-tap or pinch to swap to full original immediately
        img.addEventListener('dblclick', () => {
            const prev = img.src;
            const swap = (url) => { img.onerror = () => { img.onerror = null; img.src = prev; }; img.src = url; };
            if (img.dataset.fullSrc) swap(img.dataset.fullSrc);
            else if (fullUrl) swap(fullUrl);

        lbMediaWrap.appendChild(img);

    _lbPreloadAdjacent(idx);

    const lbPeople = document.getElementById('lb-people');
    lbPeople.innerHTML = '';

// ─── Slide navigation with animation ───

function _lbNavigate(newIdx) {

    _lbAnimating = true;
    const goingRight = newIdx > lbIndex;
    // Slide current content out
    lbMediaWrap.style.transition = 'transform 200ms ease-out, opacity 200ms ease-out';
    lbMediaWrap.style.transform = goingRight ? 'translateX(-100%)' : 'translateX(100%)';

let _lbGesture = null;

function _lbApplyZoom(animate) {
    const img = _lbGetImg();

    if (_lbZoomScale <= 1) {

    } else {

        const ih = rect.height / (lbZoomed ? _lbZoomScale : 1);

        const maxPanY = Math.max(0, (ih * _lbZoomScale - window.innerHeight) / 2);
        _lbZoomX = Math.max(-maxPanX, Math.min(maxPanX, _lbZoomX));
        _lbZoomY = Math.max(-maxPanY, Math.min(maxPanY, _lbZoomY));
        img.style.transition = animate ? 'transform 0.25s ease-out' : 'none';
        img.style.transform = 'scale(' + _lbZoomScale + ') translate(' + (_lbZoomX / _lbZoomScale) + 'px,' + (_lbZoomY / _lbZoomScale) + 'px)';
        img.classList.add('lb-zoomed');
        lbZoomed = true;
        if (_lbZoomScale > 1.5) {
            const prevSrc = img.src;
            const swapSrc = (url) => {
                if (img.src === url) return;
                img.onerror = () => { img.onerror = null; img.src = prevSrc; };
                img.src = url;
            };
            if (img.dataset.fullSrc) swapSrc(img.dataset.fullSrc);
            else {
                const items = _getLbItems();
                const item = items[lbIndex];
                if (item && item.path) {
                    const fullUrl = '/media' + encodeURI(item.path);
                    if (prevSrc.indexOf('/media') === -1) swapSrc(fullUrl);
                }
            }
        }
    }
}

function _lbResetDrag() {
    lbMediaWrap.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
    lbMediaWrap.style.transform = '';
    lbMediaWrap.style.opacity = '';
    lightbox.style.transition = 'background 0.2s ease-out';
    lightbox.style.background = '';
    setTimeout(() => {
        lbMediaWrap.style.transition = '';
        lightbox.style.transition = '';
    }, 220);
}

// Single-finger gestures: swipe left/right, swipe down to close
lightbox.addEventListener('touchstart', (e) => {
    if (e.touches.length > 1) { _lbGesture = null; return; }
    if (e.target.closest('video')) return;
    _lbGesture = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, startTime: Date.now(), locked: false, dir: null, moved: false };

    if (_lbZoomScale > 1) {
        _lbIsPanning = true;
        _lbPanStartX = e.touches[0].clientX;
        _lbPanStartY = e.touches[0].clientY;
        _lbPanStartZoomX = _lbZoomX;
        _lbPanStartZoomY = _lbZoomY;
    }

    if (_lbIsPanning && _lbZoomScale > 1) {

        _lbZoomY = _lbPanStartZoomY + (e.touches[0].clientY - _lbPanStartY);
        _lbApplyZoom(false);

        e.preventDefault();
        return;
    }
    const dx = e.touches[0].clientX - _lbGesture.startX;
    const dy = e.touches[0].clientY - _lbGesture.startY;

        lbMediaWrap.style.transform = 'translateX(' + (atEdge ? dx * 0.3 : dx) + 'px)';
    } else if (dy > 0) {
        const progress = Math.min(dy / 300, 1);
        lbMediaWrap.style.transition = 'none';
        lbMediaWrap.style.transform = 'translateY(' + dy + 'px) scale(' + (1 - progress * 0.15) + ')';

            const i = parseInt(el.dataset.idx, 10); if (i > idx) el.dataset.idx = i - 1;
        });
        const thumb = document.querySelector('.thumb-container[data-idx= + idx + ]');
        if (thumb) thumb.remove();
        if (!allItems.length) { closeLightbox(); return; }
        showLbItem(Math.min(idx, allItems.length - 1));
    } catch (e) { console.error('Delete error', e); }
});

const searchInput = document.getElementById('search-input');
const searchResultsEl = document.getElementById('search-results');
const suggestionsEl = document.getElementById('search-suggestions');
let isSearchMode = false, _searchTimer = null, _searchAllItems = null;
let _peopleNames = [], _suggestActive = -1;

// Pre-fetch named people for autocomplete
fetch('/api/photos/people/names').then(r => r.ok ? r.json() : []).then(d => { _peopleNames = d || []; }).catch(() => {});

function _getLastToken(val) {
    const parts = val.split(/ and /i);
    return (parts[parts.length - 1] || '').trim().toLowerCase();
}

function _replaceLastToken(val, replacement) {
    const parts = val.split(/ and /i);
    parts[parts.length - 1] = replacement;
    return parts.join(' and ');
}

function showSuggestions() {
    const val = searchInput.value;
    const token = _getLastToken(val);
    if (!token || !_peopleNames.length) { hideSuggestions(); return; }
    const matches = _peopleNames.filter(p => p.name.toLowerCase().startsWith(token));
    if (!matches.length) { hideSuggestions(); return; }
    _suggestActive = -1;
    suggestionsEl.innerHTML = '';
    matches.slice(0, 6).forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'suggestion-row';
        row.dataset.idx = i;
        row.innerHTML = '<img class="suggestion-avatar" src="/api/photos/people/' + p.cluster_id + '/avatar?v=13" onerror="this.style.opacity=0.15" loading="lazy">'
            + '<span class="suggestion-name">' + p.name + '</span>'
            + '<span class="suggestion-count">' + p.photo_count + '</span>';
        row.addEventListener('mousedown', (e) => {
            e.preventDefault();
            pickSuggestion(p.name);
        });
        suggestionsEl.appendChild(row);
    });
    suggestionsEl.classList.remove('hidden');
}

function hideSuggestions() {
    suggestionsEl.classList.add('hidden');
    suggestionsEl.innerHTML = '';
    _suggestActive = -1;
}

function pickSuggestion(name) {
    searchInput.value = _replaceLastToken(searchInput.value, name);
    hideSuggestions();
    searchInput.focus();
    clearTimeout(_searchTimer);
    const q = searchInput.value.trim();
    if (q) doSearch(q);
}

searchInput.addEventListener('input', () => {
    clearTimeout(_searchTimer);
    showSuggestions();
    const q = searchInput.value.trim();
    if (!q) { if (isSearchMode) exitSearch(); hideSuggestions(); return; }
    _searchTimer = setTimeout(() => doSearch(q), 450);
});

searchInput.addEventListener('focus', () => { showSuggestions(); });
searchInput.addEventListener('blur', () => { setTimeout(hideSuggestions, 150); });

searchInput.addEventListener('keydown', (e) => {
    if (suggestionsEl.classList.contains('hidden')) return;
    const rows = suggestionsEl.querySelectorAll('.suggestion-row');
    if (!rows.length) return;
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        _suggestActive = Math.min(_suggestActive + 1, rows.length - 1);
        rows.forEach((r, i) => r.classList.toggle('active', i === _suggestActive));
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        _suggestActive = Math.max(_suggestActive - 1, 0);
        rows.forEach((r, i) => r.classList.toggle('active', i === _suggestActive));
    } else if (e.key === 'Enter' && _suggestActive >= 0) {
        e.preventDefault();
        const nameEl = rows[_suggestActive].querySelector('.suggestion-name');
        if (nameEl) pickSuggestion(nameEl.textContent);
    } else if (e.key === 'Escape') {
        hideSuggestions();
    }
});

async function doSearch(q) {
    hideSuggestions();
    if (!isSearchMode) { _searchAllItems = allItems.slice(); }
    isSearchMode = true;
    gallery.classList.add('hidden');
    overview.classList.add('hidden');
    searchResultsEl.classList.remove('hidden');
    searchResultsEl.innerHTML = '<div class="text-term-gray text-[12px] px-2 py-10 text-center tracking-widest">Searching\u2026</div>';
    try {
        const resp = await fetch('/api/photos/search?q=' + encodeURIComponent(q) + '&limit=200');
        if (resp.status === 401) { window.location.href = '/login'; return; }
        const data = await resp.json();
        if (data.error) {
            searchResultsEl.innerHTML = '<div class="text-term-gray text-[12px] px-2 py-10 text-center">' + data.error + '</div>';
            return;
        }
        const items = data.results || [];
        const people = data.people || [];
        const sort = data.sort || 'relevance';
        searchResultsEl.innerHTML = '';

        // People chips
        if (people.length) {
            const chipBar = document.createElement('div');
            chipBar.className = 'people-chips';
            people.forEach(p => {
                const chip = document.createElement('div');
                chip.className = 'person-chip';
                chip.innerHTML = '<img class="chip-avatar" src="/api/photos/people/' + p.cluster_id + '/avatar?v=13" onerror="this.style.opacity=0.15">'
                    + '<span class="chip-name">' + p.name + '</span>'
                    + '<span class="chip-count">' + p.photo_count + '</span>';
                chip.addEventListener('click', () => {
                    openPersonDetail({ id: p.cluster_id, name: p.name, photo_count: p.photo_count, sample_face: p.sample_face });
                });
                chipBar.appendChild(chip);
            });
            searchResultsEl.appendChild(chipBar);
        }

        if (!items.length) {
            const msg = people.length
                ? '<div class="text-term-gray text-[12px] px-2 py-6 text-center">No photos found matching this combination</div>'
                : '<div class="text-term-gray text-[12px] px-2 py-10 text-center">No results for &ldquo;' + q + '&rdquo;</div>';
            searchResultsEl.insertAdjacentHTML('beforeend', msg);
            return;
        }
        const meta = document.createElement('div');
        meta.className = 'text-term-gray text-[11px] px-2 py-3 tracking-widest';
        meta.textContent = items.length + ' results \u00b7 by ' + sort;
        searchResultsEl.appendChild(meta);
        const grid = document.createElement('div');
        grid.className = 'grid zoom-5 gap-[2px]';
        searchResultsEl.appendChild(grid);
        allItems = items;
        for (let i = 0; i < items.length; i++) {
            const item = items[i];
            const container = document.createElement('div');
            container.className = 'thumb-container skeleton';
            container.dataset.idx = i;
            if (item.type === 'video') {
                const badge = document.createElement('div'); badge.className = 'video-badge';
                container.appendChild(badge);
            }
            const img = new Image(); img.src = item.thumb || ''; img.alt = '';
            img.onload = () => { container.classList.remove('skeleton'); img.classList.add('thumb-loaded'); };
            img.onerror = () => container.classList.remove('skeleton');
            container.appendChild(img);
            container.addEventListener('click', () => openLightbox(i));
            grid.appendChild(container);
        }
    } catch (e) {
        searchResultsEl.innerHTML = '<div class="text-term-gray text-[12px] px-2 py-10 text-center">Search unavailable</div>';
    }
}

function exitSearch() {
    isSearchMode = false;
    searchResultsEl.classList.add('hidden');
    searchResultsEl.innerHTML = '';
    hideSuggestions();
    if (_searchAllItems) { allItems = _searchAllItems; _searchAllItems = null; }
    if (currentView === 'grid') gallery.classList.remove('hidden');
    else overview.classList.remove('hidden');
}

// ─── Share pre-fetch cache (iOS) ───
// Files are fetched as JPEG in the background as soon as a photo is selected,
// so navigator.share() can be called synchronously from the tap (no activation expiry).
const _shareCache = new Map(); // path -> File
function _prefetch(path) {
    if (_shareCache.has(path) || !navigator.share || navigator.maxTouchPoints < 1) return;
    fetch(_shareUrl(path))
        .then(r => r.ok ? r.blob() : null)
        .then(b => {
            if (!b) return;
            const mime = _isVideo(path) ? (b.type || 'video/mp4') : 'image/jpeg';
            _shareCache.set(path, new File([b], _shareFilename(path), { type: mime }));
        })
        .catch(() => {});
}

// ─── Select: download ───
document.getElementById('sel-download-btn').addEventListener('click', () => {
    if (!selectedHashes.size) return;
    const paths = [];
    document.querySelectorAll('.thumb-container.selected').forEach(el => {
        const idx = parseInt(el.dataset.idx, 10);
        if (!isNaN(idx) && allItems[idx] && allItems[idx].path) paths.push(allItems[idx].path);
    });
    if (!paths.length) return;

    const btn = document.getElementById('sel-download-btn');
    const isMobile = navigator.maxTouchPoints > 0 && navigator.share;

    if (!isMobile) {
        window.location.href = '/api/photos/download-zip?' + paths.map(p => 'p=' + encodeURIComponent(p)).join('&');
        return;
    }

    // Check if all files are already cached
    const cached = paths.map(p => _shareCache.get(p));
    if (cached.every(Boolean)) {
        navigator.share({ files: cached }).catch(() => {});
        return;
    }

    // Fetch files first, then prompt user to tap again (fresh gesture for iOS activation)
    btn.disabled = true;
    let done = cached.filter(Boolean).length;
    btn.textContent = `${done} / ${paths.length}`;
    Promise.all(paths.map(async (p, i) => {
        if (cached[i]) return cached[i];
        const r = await fetch(_shareUrl(p));
        if (!r.ok) throw new Error(r.status);
        const b = await r.blob();
        const mime = _isVideo(p) ? (b.type || 'video/mp4') : 'image/jpeg';
        const f = new File([b], _shareFilename(p), { type: mime });
        _shareCache.set(p, f);
        btn.textContent = `${++done} / ${paths.length}`;
        return f;
    })).then(() => {
        btn.textContent = 'Save to Photos';
        btn.disabled = false;
        // Next tap will hit the cached path above and share instantly
    }).catch(() => {
        btn.textContent = 'Download';
        btn.disabled = false;
    });
});

        for (let i = 0; i < photos.length; i++) {
            const item = photos[i];
            const d = item.date ? new Date(item.date * 1000) : null;
            const key = d ? (d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0')) : '0000-00';
            if (!ssGroups.has(key)) ssGroups.set(key, []);
            ssGroups.get(key).push({ item });
        }
        const ssSortedKeys = [...ssGroups.keys()].sort((a, b) => b.localeCompare(a));
        // Sort within each month by date descending and rebuild array in display order
        const ssReordered = [];
        for (const key of ssSortedKeys) {
            const entries = ssGroups.get(key);
            entries.sort((a, b) => (b.item.date || 0) - (a.item.date || 0));
            for (const entry of entries) { entry.globalIdx = ssReordered.length; ssReordered.push(entry.item); }
        }
        _screenshotPhotos = ssReordered;

        for (const key of ssSortedKeys) {
            const entries = ssGroups.get(key);
            const header = document.createElement('div');
            header.style.cssText = 'padding:14px 4px 8px;display:flex;align-items:baseline;gap:8px;';
            const parts = key.split('-');
            const label = key === '0000-00' ? 'Unknown Date' : SS_MONTHS[parseInt(parts[1])] + ' ' + parts[0];
            header.innerHTML = '<span class="text-[22px] font-bold tracking-[0.12em] text-accent-bright" style="font-family:\'Rajdhani\',sans-serif;font-weight:700;text-transform:uppercase">' + label.toUpperCase() + '</span>'
                + '<span class="text-term-dark text-[14px]">' + entries.length + '</span>';
            content.appendChild(header);

            const grid = document.createElement('div');
            grid.className = 'grid zoom-5 gap-[1px]';
            for (const { item, globalIdx } of entries) {
                const cell = document.createElement('div');
                cell.className = 'thumb-container';
                const img = document.createElement('img');
                img.src = item.thumb || '';
                img.loading = 'lazy';
                img.alt = '';
                img.onload = function() { this.classList.add('thumb-loaded'); };
                cell.appendChild(img);
                if (item.type === 'video') {
                    const badge = document.createElement('div');
                    badge.className = 'video-badge';
                    badge.textContent = 'VID';
                    cell.appendChild(badge);
                }
                cell.addEventListener('click', () => openScreenshotLightbox(globalIdx));
                grid.appendChild(cell);
            }
            content.appendChild(grid);
        }
        document.getElementById('people-subtitle').textContent = photos.length + ' items';
    } catch(e) {
        content.innerHTML = '<div class="text-term-gray text-[12px] py-10 text-center">Failed to load screenshots.</div>';
    }
}

function openScreenshotLightbox(idx) {
    openLightbox(idx, _screenshotPhotos);
}

// ─── Face review (Google Photos style) ───
let _reviewQueue = [];
let _reviewIdx = 0;
let _reviewTotal = 0;
let _reviewAccepted = 0;
let _reviewRejected = 0;
let _reviewedHashes = new Set(); // tracks all reviewed photos this session

async function startFaceReview() {
    const content = document.getElementById('people-content');
    document.getElementById('people-title').textContent = 'REVIEW';
    document.getElementById('people-subtitle').textContent = 'loading…';
    const _rb = document.getElementById('header-review-btn'); if (_rb) _rb.remove();
    content.innerHTML = '<div class="text-term-gray text-[12px] py-10 text-center">Loading suggestions…</div>';

    try {
        const skip = [..._reviewedHashes].join(',');
        const resp = await fetch('/api/photos/face/review?batch=50&skip=' + encodeURIComponent(skip));
        if (!resp.ok) throw new Error();
        const data = await resp.json();
        _reviewQueue = data.items;
        _reviewTotal = data.remaining;
        _reviewIdx = 0;
        _reviewAccepted = 0;
        _reviewRejected = 0;

        if (!_reviewQueue.length) {
            content.innerHTML = '<div class="text-term-gray text-[12px] py-10 text-center">No photos to review right now.</div>';
            document.getElementById('people-subtitle').textContent = '';
            return;
        }
        showReviewCard();
    } catch(e) {
        content.innerHTML = '<div class="text-term-gray text-[12px] py-10 text-center">Failed to load review data.</div>';
    }
}

function showReviewCard() {
    if (_reviewIdx >= _reviewQueue.length) {
        const content = document.getElementById('people-content');
        content.innerHTML = '<div class="review-card">'
            + '<div class="text-term-white text-sm font-medium">Batch complete</div>'
            + '<div class="text-term-gray text-[11px]">' + _reviewAccepted + ' accepted, ' + _reviewRejected + ' rejected</div>'
            + '<button class="review-btn review-btn-yes" id="review-more" style="max-width:320px">Review More</button>'
            + '</div>';
        document.getElementById('people-subtitle').textContent = _reviewTotal + ' remaining';
        document.getElementById('review-more').addEventListener('click', startFaceReview);
        return;
    }

    const item = _reviewQueue[_reviewIdx];
    const content = document.getElementById('people-content');
    const progress = ((_reviewIdx) / _reviewQueue.length) * 100;
    document.getElementById('people-subtitle').textContent =
        (_reviewIdx + 1) + ' / ' + _reviewQueue.length + '  •  ' + _reviewTotal + ' remaining';

    content.innerHTML = '<div class="review-card">'
        + '<div class="review-progress"><div class="review-progress-bar" style="width:' + progress + '%"></div></div>'
        + '<img class="review-photo" src="' + (item.thumb || '') + '" onerror="this.style.opacity=0.15">'
        + '<div class="review-suggestion">'
        +   '<img class="review-avatar" src="/api/photos/people/' + (item.suggested_cluster || '') + '/avatar?v=13" onerror="this.style.opacity=0.15">'
        +   '<div>'
        +     '<div class="review-name">' + item.suggested_name + '?</div>'
        +     '<div class="review-conf">' + item.confidence + '% confidence</div>'
        +   '</div>'
        + '</div>'
        + '<div class="review-actions">'
        +   '<button class="review-btn review-btn-no" id="review-no">No</button>'
        +   '<button class="review-btn review-btn-skip" id="review-skip">Skip</button>'
        +   '<button class="review-btn review-btn-yes" id="review-yes">Yes</button>'
        + '</div>'
        + '</div>';

    document.getElementById('review-yes').addEventListener('click', () => { _reviewedHashes.add(item.photo_hash); submitReview(true); });
    document.getElementById('review-no').addEventListener('click', () => { _reviewedHashes.add(item.photo_hash); submitReview(false); });
    document.getElementById('review-skip').addEventListener('click', () => { _reviewedHashes.add(item.photo_hash); _reviewIdx++; showReviewCard(); });
}

async function submitReview(accept) {
    const item = _reviewQueue[_reviewIdx];
    try {
        await fetch('/api/photos/face/review', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                photo_hash: item.photo_hash,
                cluster_id: item.suggested_cid,
                accept: accept,
            })
        });
        if (accept) _reviewAccepted++; else _reviewRejected++;
    } catch(e) {}
    _reviewIdx++;
    showReviewCard();
}

        t = document.createElement('div');

document.getElementById('ps-remove-btn').addEventListener('click', async () => {
    if (!_personSelectedHashes.size || !_currentPersonCluster) return;
    const n = _personSelectedHashes.size;
    if (!confirm('Remove ' + n + ' photo' + (n > 1 ? 's' : '') + ' from ' + (_currentPersonCluster.name || 'this person') + '?')) return;

        const resp = await fetch('/api/photos/face/' + _currentPersonCluster.id + '/remove', {
            method: 'POST', headers: {'Content-Type': 'application/json'},

        });

        const data = await resp.json();
        exitPersonSelectMode();

document.getElementById('ps-move-btn').addEventListener('click', async () => {
    if (!_personSelectedHashes.size || !_currentPersonCluster) return;
    try {
        const resp = await fetch('/api/photos/faces');
        if (!resp.ok) throw new Error();
        const data = await resp.json();
        const list = document.getElementById('move-to-list');

        document.getElementById('move-to-sub').textContent = _personSelectedHashes.size + ' photo' + (_personSelectedHashes.size > 1 ? 's' : '') + ' selected';
